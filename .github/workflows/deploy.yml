name: Deploy to DirectAdmin via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        
    - name: Install Dependencies (Composer)
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Sync files to DirectAdmin (FTP via lftp)
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -c "
        set ftp:ssl-allow yes
        set ssl:verify-certificate no
        set net:max-retries 3
        set net:timeout 15
        set net:reconnect-interval-base 5
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
        mirror -R --parallel=2 --continue --exclude-glob .git* --exclude-glob node_modules/ --exclude .env.example --exclude .github/ ./ /domains/ssb-sumberharjo.web.id/public_html/
        "
